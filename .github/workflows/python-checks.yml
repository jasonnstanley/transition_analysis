name: Python checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Verify core imports
        run: |
          python -c "import numpy"
          python -c "import pandas"
          python -c "import matplotlib"
          python -c "import sklearn"
          python -c "import scipy"
          python -c "import statsmodels"
          python -c "import yaml"
          python -c "import openpyxl"

      - name: Verify research data files
        run: |
          python -c "from pathlib import Path; assert Path('data/processed/transition_research.csv').exists()"
          python -c "from pathlib import Path; assert Path('data/processed/train_test_split.csv').exists()"

      - name: Verify protected files are absent
        run: |
          python -c "from pathlib import Path; assert not Path('data/raw/33130_autumn_2026.csv').exists()"
          python -c "from pathlib import Path; assert not Path('data/secure/student_crosswalk.csv').exists()"
          
          
      - name: Run public data integrity test
        run: python tests/test_public_data.py      
        
      - name: Verify research schema
        run: python tests/test_schema.py  
      

      - name: Verify canonical train/test split
        run: python tests/test_train_test_split.py
      
      
      